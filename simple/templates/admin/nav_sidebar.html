{% load i18n %}
<button class="sticky toggle-nav-sidebar" id="toggle-nav-sidebar" aria-label="{% translate 'Toggle navigation' %}"></button>
<nav class="sticky" id="nav-sidebar" aria-label="{% translate 'Sidebar' %}">
  <div class="crm-sidebar-top">
    <div class="crm-sidebar-top__label">Навигация</div>
    <a class="crm-sidebar-link{% if request.resolver_match.url_name == 'index' or request.resolver_match.url_name == 'crm_dashboard' %} is-active{% endif %}" href="{% url 'admin:index' %}">
      <span class="crm-sidebar-link__dot"></span>
      <span>Панель</span>
    </a>
    <a class="crm-sidebar-link{% if request.resolver_match.url_name == 'crm_reports' %} is-active{% endif %}" href="{% url 'admin:crm_reports' %}">
      <span class="crm-sidebar-link__dot"></span>
      <span>Отчёты</span>
    </a>
    <a class="crm-sidebar-link{% if request.resolver_match.url_name == 'crm_backups' %} is-active{% endif %}" href="{% url 'admin:crm_backups' %}">
      <span class="crm-sidebar-link__dot"></span>
      <span>Резервное копирование БД</span>
    </a>
  </div>

  <label class="crm-sidebar-filter" for="nav-filter">
    <span>Фильтр разделов</span>
    <input type="search" id="nav-filter" placeholder="Начните вводить название" aria-label="{% translate 'Filter navigation items' %}">
  </label>

  {% include 'admin/app_list.html' with app_list=available_apps show_changelinks=False %}
</nav>
